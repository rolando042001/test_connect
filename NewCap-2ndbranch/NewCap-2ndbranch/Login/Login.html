<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Suite | EUGRACE</title>
    <link href="../styles.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .transition-smooth { transition: transform 0.8s cubic-bezier(0.7, 0, 0.3, 1); }
        .is-signup .image-side { transform: translateX(100%); }
        .is-signup .form-side { transform: translateX(-100%); }
        
        @media (max-width: 767px) {
            .is-signup .image-side, .is-signup .form-side { transform: none !important; }
        }

        /* Stagger Animation Base */
        .stagger-item { 
            opacity: 0; 
            transform: translateY(15px); 
            transition: all 0.5s ease; 
        }
        .view-active .stagger-item { 
            opacity: 1; 
            transform: translateY(0); 
        }

        /* Transition Delays */
        .delay-1 { transition-delay: 0.05s; }
        .delay-2 { transition-delay: 0.1s; }
        .delay-3 { transition-delay: 0.15s; }
        .delay-4 { transition-delay: 0.2s; }
        .delay-5 { transition-delay: 0.25s; }
        .delay-6 { transition-delay: 0.3s; }
        .delay-7 { transition-delay: 0.35s; }
    </style>
</head>
<body class="h-screen bg-[#071330] flex items-center justify-center p-[15px] font-sans overflow-hidden">

    <div class="auth-card relative flex w-full max-w-[1050px] h-[90vh] max-h-[780px] bg-[#02b5ff] rounded-[48px] shadow-2xl overflow-hidden" id="card">
        
        <div id="toast" class="absolute top-6 left-6 right-6 p-4 rounded-[20px] hidden items-center gap-3 text-sm font-bold z-[100] shadow-lg animate-bounce"></div>

        <div class="side-panel image-side transition-smooth relative z-[3] w-1/2 h-full bg-[#1e1b4b] overflow-hidden hidden md:block">
            <img src="../PICS/front.jpeg" class="absolute -inset-5 w-[calc(100%+40px)] h-[calc(100%+40px)] object-cover opacity-60" id="hero-img">
            <div class="absolute inset-0 bg-gradient-to-br from-[#1e1b4b]/80 to-[#312e81]/30 flex flex-col justify-end p-[60px] text-white z-[4]">
                <h1 class="text-[44px] font-black mb-4 leading-[1.1]">EUGRACE BUSINESS<br> SOLUTION OPC</h1>
                <p class="opacity-90 text-[17px] font-light leading-relaxed max-w-[320px]">Experience the next standard of workspace security.</p>
            </div>
        </div>

        <div class="side-panel form-side transition-smooth relative z-[2] w-full md:w-1/2 h-full bg-white/70 p-10 md:p-[60px] flex flex-col justify-start overflow-y-auto">
            <div class="form-container view-active w-full max-w-[380px] mx-auto" id="form-content">
                
                <div class="stagger-item delay-1">
                    <h2 id="view-title" class="text-4xl font-black text-slate-900 mb-2">Log In</h2>
                    <p id="view-subtitle" class="text-slate-500 text-[15px] mb-[35px] font-medium">Enter your credentials to continue.</p>
                </div>

                <div id="lock-timer" class="stagger-item bg-amber-50 border-2 border-amber-100 p-3.5 rounded-[18px] mb-6 hidden items-center gap-3 text-amber-800 text-sm font-bold delay-2">
                    <i data-lucide="shield-alert" class="w-5"></i>
                    <span id="lock-msg"></span>
                </div>

                <form id="auth-form">
                    <div id="names-row" class="hidden stagger-item flex gap-3 mb-5 delay-3">
                        <div class="relative flex-1">
                            <i data-lucide="user" class="absolute left-5 top-1/2 -translate-y-1/2 w-5 text-slate-400"></i>
                            <input id="fname" class="w-full pl-[54px] pr-4 py-4 bg-slate-50 border-2 border-slate-100 rounded-[20px] outline-none focus:border-indigo-600 focus:bg-white transition-all" placeholder="First Name">
                        </div>
                        <div class="relative flex-1">
                            <input id="lname" class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-100 rounded-[20px] outline-none focus:border-indigo-600 focus:bg-white transition-all" placeholder="Last Name">
                        </div>
                    </div>

                    <div id="dept-row" class="hidden stagger-item relative mb-5 delay-4">
                        <i data-lucide="briefcase" class="absolute left-5 top-1/2 -translate-y-1/2 w-5 text-slate-400"></i>
                        <select class="w-full pl-[54px] pr-10 py-4 bg-slate-50 border-2 border-slate-100 rounded-[20px] outline-none focus:border-indigo-600 focus:bg-white transition-all appearance-none cursor-pointer" id="department">
                            <option value="" disabled selected>Select Department</option>
                        </select>
                        <div class="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none border-t-[5px] border-t-slate-400 border-x-[5px] border-x-transparent"></div>
                    </div>

                    <div class="relative mb-5 stagger-item delay-5">
                        <i data-lucide="mail" class="absolute left-5 top-1/2 -translate-y-1/2 w-5 text-slate-400"></i>
                        <input class="w-full pl-[54px] pr-4 py-4 bg-slate-50 border-2 border-slate-100 rounded-[20px] outline-none focus:border-indigo-600 focus:bg-white transition-all" type="email" id="email" placeholder="Email Address" required>
                    </div>

                    <div id="pw-group" class="relative mb-5 stagger-item delay-6">
                        <i data-lucide="lock" class="absolute left-5 top-1/2 -translate-y-1/2 w-5 text-slate-400"></i>
                        <input class="w-full pl-[54px] pr-[54px] py-4 bg-slate-50 border-2 border-slate-100 rounded-[20px] outline-none focus:border-indigo-600 focus:bg-white transition-all" type="password" id="password" placeholder="Password">
                        <button type="button" class="password-toggle absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-indigo-600 transition-colors" data-target="password">
                            <i data-lucide="eye" class="w-5"></i>
                        </button>
                    </div>

                    <div id="meter-box" class="hidden stagger-item bg-white p-4 rounded-[20px] mb-5 border-2 border-slate-50 delay-7">
                        <div class="flex gap-1.5 h-1.5 mb-3">
                            <div class="bar-seg flex-1 bg-slate-100 rounded-full transition-colors"></div>
                            <div class="bar-seg flex-1 bg-slate-100 rounded-full transition-colors"></div>
                            <div class="bar-seg flex-1 bg-slate-100 rounded-full transition-colors"></div>
                            <div class="bar-seg flex-1 bg-slate-100 rounded-full transition-colors"></div>
                        </div>
                        <ul class="grid grid-cols-2 gap-2.5">
                            <li class="req-item flex items-center gap-1.5 text-[11px] font-bold text-slate-400" data-req="len"><span class="check-dot w-3 h-3 border-2 border-slate-200 rounded-full"></span> 8+ chars</li>
                            <li class="req-item flex items-center gap-1.5 text-[11px] font-bold text-slate-400" data-req="num"><span class="check-dot w-3 h-3 border-2 border-slate-200 rounded-full"></span> Numbers</li>
                            <li class="req-item flex items-center gap-1.5 text-[11px] font-bold text-slate-400" data-req="spec"><span class="check-dot w-3 h-3 border-2 border-slate-200 rounded-full"></span> Symbols</li>
                            <li class="req-item flex items-center gap-1.5 text-[11px] font-bold text-slate-400" data-req="case"><span class="check-dot w-3 h-3 border-2 border-slate-200 rounded-full"></span> Mix cases</li>
                        </ul>
                    </div>

                    <div id="cpw-group" class="hidden relative mb-5 stagger-item delay-7">
                        <i data-lucide="check-circle-2" class="absolute left-5 top-1/2 -translate-y-1/2 w-5 text-slate-400"></i>
                        <input class="w-full pl-[54px] pr-[54px] py-4 bg-slate-50 border-2 border-slate-100 rounded-[20px] outline-none focus:border-indigo-600 focus:bg-white transition-all" type="password" id="confirm-password" placeholder="Confirm Password">
                        <button type="button" class="password-toggle absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-indigo-600 transition-colors" data-target="confirm-password">
                            <i data-lucide="eye" class="w-5"></i>
                        </button>
                    </div>

                    <div id="forgot-wrap" class="stagger-item text-right mb-[30px] delay-7">
                        <button type="button" class="text-indigo-600 font-extrabold text-sm hover:underline underline-offset-4" id="go-forgot">Forgot Password?</button>
                    </div>

                    <div class="stagger-item delay-7">
                        <button class="w-full p-[18px] bg-indigo-600 text-white rounded-[20px] font-bold text-lg flex items-center justify-center gap-3 shadow-lg hover:bg-indigo-700 hover:-translate-y-0.5 active:scale-95 transition-all" type="submit" id="submit-btn">
                            <span id="btn-label">Log In</span>
                            <i data-lucide="arrow-right" class="w-5"></i>
                        </button>
                    </div>
                </form>

                <div class="stagger-item mt-10 text-center border-t-2 border-slate-50 pt-[30px] delay-7">
                    <p class="text-sm text-slate-500 font-medium">
                        <span id="foot-txt">New around here?</span>
                        <button class="text-indigo-600 font-extrabold ml-2 hover:underline underline-offset-4" id="switch-btn">Sign Up</button>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="Login.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
