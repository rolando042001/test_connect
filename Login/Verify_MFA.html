<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Verify MFA | Eufile</title>
<style>
:root {
  --primary:#03acfa; --bg:#0f172a; --card:#ffffff;
  --text:#1e293b; --dim:#64748b; --border:#e2e8f0;
  --success:#10b981; --danger:#ef4444;
}
* { box-sizing: border-box; }
body {
  margin:0; font-family:"Segoe UI",sans-serif;
  min-height:100vh;
  background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
  display:flex; align-items:center; justify-content:center;
  padding: 20px;
}
.card {
  background: var(--card); width:100%; max-width:400px;
  border-radius:20px; padding:40px 35px;
  box-shadow: 0 20px 60px rgba(0,0,0,.3);
}
.logo { text-align:center; font-size:1.6rem; font-weight:800; color: var(--primary); margin-bottom:8px; }
h1 { margin:0 0 6px; font-size:1.4rem; text-align:center; color:var(--text); }
.sub { text-align:center; color:var(--dim); font-size:.9rem; margin-bottom:25px; }

.method-tabs { display:flex; gap:8px; margin-bottom:20px; }
.tab {
  flex:1; padding:10px; border-radius:10px; border:1px solid var(--border);
  background:#f8fafc; color:var(--dim); font-weight:600; cursor:pointer; font-size:.85rem;
  transition:.2s;
}
.tab.active { background: var(--primary); color:white; border-color: var(--primary); }

.pin-display {
  display:flex; gap:10px; justify-content:center; margin:20px 0;
}
.pin-dot {
  width:14px; height:14px; border-radius:50%;
  border:2px solid var(--border); background:white;
}
.pin-dot.filled { background: var(--primary); border-color: var(--primary); }

.keypad { display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; }
.key {
  padding:18px; border-radius:12px; border:1px solid var(--border);
  background:#f8fafc; font-size:1.2rem; font-weight:600;
  cursor:pointer; transition:.15s; user-select:none;
}
.key:hover { background:#e0f2fe; border-color: var(--primary); }
.key:active { transform: scale(0.95); }
.key.action { background:#fef2f2; color:var(--danger); border-color:#fecaca; }

.btn-submit {
  width:100%; margin-top:20px; padding:14px;
  background: var(--primary); color:white; border:none; border-radius:12px;
  font-weight:700; font-size:1rem; cursor:pointer; transition:.2s;
}
.btn-submit:hover { opacity:.9; }
.btn-submit:disabled { opacity:.5; cursor:not-allowed; }

.toast {
  margin-top:15px; padding:12px; border-radius:10px;
  text-align:center; font-size:.85rem; font-weight:600;
  display:none;
}
.toast.error   { background:#fef2f2; color:var(--danger); display:block; }
.toast.success { background:#f0fdf4; color:var(--success); display:block; }

.esp-panel { text-align:center; padding:20px; }
.esp-panel .icon { font-size: 3rem; margin-bottom:10px; }
.esp-panel .hint { color:var(--dim); font-size:.85rem; }
.spinner {
  display:inline-block; width:32px; height:32px;
  border:3px solid var(--border); border-top-color: var(--primary);
  border-radius:50%; animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.logout-link {
  display:block; text-align:center; margin-top:18px;
  color:var(--dim); font-size:.8rem; text-decoration:none;
}
.logout-link:hover { color:var(--danger); }
</style>
</head>
<body>

<div class="card">
  <div class="logo">☁️ Eufile</div>
  <h1>Two-Factor Verification</h1>
  <p class="sub">An extra step is required to access your account.</p>

  <div class="method-tabs">
    <button class="tab active" data-method="passcode" onclick="switchMethod('passcode')">Passcode</button>
    <button class="tab" data-method="esp32" onclick="switchMethod('esp32')">ESP32 Card Tap</button>
  </div>

  <!-- PASSCODE METHOD -->
  <div id="passcodePanel">
    <div class="pin-display" id="pinDisplay"></div>

    <div class="keypad">
      <button class="key" onclick="pinPress('1')">1</button>
      <button class="key" onclick="pinPress('2')">2</button>
      <button class="key" onclick="pinPress('3')">3</button>
      <button class="key" onclick="pinPress('4')">4</button>
      <button class="key" onclick="pinPress('5')">5</button>
      <button class="key" onclick="pinPress('6')">6</button>
      <button class="key" onclick="pinPress('7')">7</button>
      <button class="key" onclick="pinPress('8')">8</button>
      <button class="key" onclick="pinPress('9')">9</button>
      <button class="key action" onclick="pinClear()">C</button>
      <button class="key" onclick="pinPress('0')">0</button>
      <button class="key action" onclick="pinBackspace()">⌫</button>
    </div>

    <button class="btn-submit" id="verifyBtn" onclick="submitPasscode()">Verify</button>
  </div>

  <!-- ESP32 METHOD -->
  <div id="espPanel" style="display:none;">
    <div class="esp-panel">
      <div class="spinner"></div>
      <h3 style="margin:15px 0 5px;">Tap your card on the cabinet</h3>
      <p class="hint">Waiting for a successful 3-factor scan from the physical cabinet within the last 60 seconds...</p>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <a class="logout-link" href="../Backend/logout.php">Cancel and log out</a>
</div>

<script>
let pin = '';
let currentMethod = 'passcode';
let espPollTimer = null;
const PIN_LEN = 6;

function renderPin() {
    const display = document.getElementById('pinDisplay');
    display.innerHTML = '';
    for (let i = 0; i < PIN_LEN; i++) {
        const dot = document.createElement('div');
        dot.className = 'pin-dot' + (i < pin.length ? ' filled' : '');
        display.appendChild(dot);
    }
}

function pinPress(d) {
    if (pin.length >= 8) return;
    pin += d;
    renderPin();
    if (pin.length === PIN_LEN) submitPasscode();
}

function pinBackspace() { pin = pin.slice(0, -1); renderPin(); }
function pinClear()     { pin = ''; renderPin(); }

function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type;
    if (type === 'error') setTimeout(() => { t.className = 'toast'; }, 4000);
}

async function submitPasscode() {
    if (pin.length < 4) return showToast('Passcode must be at least 4 digits.', 'error');

    const btn = document.getElementById('verifyBtn');
    btn.disabled = true; btn.textContent = 'Verifying...';

    const fd = new FormData();
    fd.append('method', 'passcode');
    fd.append('passcode', pin);

    try {
        const res  = await fetch('../Backend/verify_mfa.php', { method:'POST', body: fd });
        const json = await res.json();
        if (json.status === 'success') {
            showToast('Verified! Redirecting...', 'success');
            setTimeout(() => window.location.href = '../Landing/Dashboard.html', 700);
        } else {
            showToast(json.msg || 'Verification failed.', 'error');
            pinClear();
        }
    } catch (e) {
        showToast('Server error.', 'error');
    } finally {
        btn.disabled = false; btn.textContent = 'Verify';
    }
}

function switchMethod(method) {
    currentMethod = method;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.method === method));
    document.getElementById('passcodePanel').style.display = method === 'passcode' ? 'block' : 'none';
    document.getElementById('espPanel').style.display     = method === 'esp32'    ? 'block' : 'none';

    if (method === 'esp32') startEspPolling();
    else stopEspPolling();
}

function startEspPolling() {
    if (espPollTimer) return;
    espPollTimer = setInterval(async () => {
        const fd = new FormData();
        fd.append('method', 'esp32');
        try {
            const res  = await fetch('../Backend/verify_mfa.php', { method:'POST', body: fd });
            const json = await res.json();
            if (json.status === 'success') {
                stopEspPolling();
                showToast('Card verified! Redirecting...', 'success');
                setTimeout(() => window.location.href = '../Landing/Dashboard.html', 700);
            }
        } catch (e) { /* keep polling */ }
    }, 2500);
}

function stopEspPolling() {
    if (espPollTimer) { clearInterval(espPollTimer); espPollTimer = null; }
}

renderPin();
</script>
</body>
</html>
