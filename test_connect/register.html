<!DOCTYPE html>
<html>

<head>
<title>test_connect</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
}

.container{
background:white;
padding:20px;
margin:auto;
margin-top:50px;
width:400px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

button{
padding:10px;
width:200px;
margin-top:10px;
}

select{
padding:8px;
width:200px;
}

</style>

</head>

<body>

<div class="container">

<h2>Smart Cabinet Control</h2>

<h3>Register New User</h3>

<button onclick="startRegister()">Start Registration</button>

<p id="regStatus"></p>

<hr>

<h3>Unlock Cabinet</h3>

<label>Select Relay</label><br>

<select id="relay">
<option value="1">Cabinet 1</option>
<option value="2">Cabinet 2</option>
</select>

<br><br>

<label>Select RFID UID</label><br>

<select id="uid"></select>

<br><br>

<button onclick="unlockCabinet()">Start Authentication</button>

<p id="unlockStatus"></p>

</div>

<script>

loadUIDs();

function startRegister(){

fetch("register_start.php")
.then(res=>res.text())
.then(data=>{
document.getElementById("regStatus").innerHTML="Registration Started";
});

}

function loadUIDs(){

fetch("get_rfids.php")
.then(res=>res.json())
.then(data=>{

let dropdown=document.getElementById("uid");
dropdown.innerHTML="";

data.forEach(function(user){

let option=document.createElement("option");

option.value=user.rfid_uid;
option.text=user.rfid_uid;

dropdown.appendChild(option);

});

});

}

function unlockCabinet(){

let relay=document.getElementById("relay").value;
let uid=document.getElementById("uid").value;

fetch("activate_relay.php",{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:"relay="+relay+"&uid="+uid
})
.then(res=>res.text())
.then(data=>{
document.getElementById("unlockStatus").innerHTML=data;
});

}

</script>

</body>

</html>
